<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
.root{
  background:#111;
  height:520px;
  font-family:'Noto Sans KR',sans-serif;
  color:#fff;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.topbar{
  display:flex;
  justify-content:flex-end;
  align-items:center;
  gap:10px;
  padding:10px 18px;
  background:#111;
  flex-shrink:0;
}
.topbar-label{font-size:13px;color:#ccc;margin-right:2px;}
.cpill{
  display:flex;align-items:center;gap:6px;
  background:#1565a0;
  border-radius:20px;
  padding:4px 14px 4px 10px;
}
.cpill .val{font-size:15px;font-weight:700;color:#fff;letter-spacing:1px;}
.main{display:flex;flex:1;padding:0 12px 12px;gap:12px;overflow:hidden;}
.sidebar{
  width:170px;min-width:150px;
  background:#555;border-radius:14px;
  display:flex;flex-direction:column;
  padding:10px;flex-shrink:0;
}
.sidebar-title{
  background:#666;border-radius:10px;
  text-align:center;padding:8px 4px;
  font-size:13px;font-weight:700;color:#fff;
  margin-bottom:8px;line-height:1.5;
}
.preview-box{
  background:#1565a0;border-radius:10px;flex:1.1;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#b0d4f1;text-align:center;
  min-height:100px;padding:10px;line-height:1.7;
}
.sdiv{border:none;border-top:1.5px dashed #888;margin:8px 0;}
.desc-box{
  background:#1565a0;border-radius:10px;flex:1.8;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;color:#b0d4f1;text-align:center;
  min-height:120px;padding:12px;line-height:1.7;
}
.right-panel{flex:1;display:flex;flex-direction:column;min-width:0;}
.rdiv{border:none;border-top:1.5px dashed #555;margin:0 0 10px;}
.skills-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;flex:1;}
.sc{
  background:#555;border-radius:12px;
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;cursor:pointer;
  transition:background 0.15s,border 0.15s;
  border:2.5px solid transparent;min-height:70px;
}
.sc:hover{background:#686868;}
.sc.active{background:#fff;border-color:#ccc;}
.sc.active .sl{color:#222;}
.si{
  width:44px;height:44px;background:#1565a0;
  border-radius:10px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;font-size:22px;
}
.sl{font-size:18px;font-weight:700;color:#ddd;letter-spacing:1px;white-space:nowrap;}
.sc.maxed .sl{color:#f5c842;}
</style>

<div class="root">
  <div class="topbar">
    <span class="topbar-label">보유 재화</span>
    <div class="cpill"><span>🔴</span><span class="val" id="rv">1,210</span></div>
    <div class="cpill"><span>💠</span><span class="val" id="sv">2</span></div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-title">심연<br>-연구 현황-</div>
      <div class="preview-box" id="pb">(영상)<br>스킬 프리뷰</div>
      <hr class="sdiv">
      <div class="desc-box" id="db">스킬 설명</div>
    </div>
    <div class="right-panel">
      <hr class="rdiv">
      <div class="skills-grid" id="sg"></div>
    </div>
  </div>
</div>

<script>
const skills=[
  {id:0,icon:'🏺',name:'보유량 증가',desc:'🔴 일반 재화 총 보유량이 500 증가합니다.',preview:'재화 보유량\n+500 증가',level:0,max:3},
  {id:1,icon:'⏳',name:'탐사 연장',desc:"'심연' 탐사 가능 시간이 2시간 증가합니다.",preview:'심연 탐사\n시간 +2h',level:1,max:3},
  {id:2,icon:'🌐',name:'획득 범위',desc:'🔴 일반 재화 획득 범위가 30% 확장됩니다.',preview:'재화 획득\n범위 +30%',level:0,max:3},
  {id:3,icon:'⚔️',name:'드롭 강화',desc:'몬스터 처치 시 재화 드롭 확률이 증가합니다.',preview:'드롭 확률\n대폭 상승',level:1,max:3},
  {id:4,icon:'🛡️',name:'방어 연구',desc:'심연 탐사 중 받는 피해를 20% 감소시킵니다.',preview:'피해 감소\n-20%',level:1,max:3},
  {id:5,icon:'🔥',name:'마력 연소',desc:'특수 스킬 발동 시 추가 피해를 입힙니다.',preview:'추가 피해\n발동',level:1,max:3},
  {id:6,icon:'💀',name:'마물 강탈',desc:'보스 처치 시 특수 재화를 추가로 획득합니다.',preview:'보스 처치\n추가 보상',level:0,max:3},
  {id:7,icon:'🌙',name:'심야 탐사',desc:'야간 탐사 시 재화 획득량이 50% 증가합니다.',preview:'야간 재화\n+50%',level:0,max:3},
  {id:8,icon:'⚡',name:'번개 소환',desc:'특수 스킬로 번개를 소환해 광역 피해를 줍니다.',preview:'광역 번개\n공격',level:2,max:3},
  {id:9,icon:'🗡️',name:'암습 강화',desc:'암습 공격의 피해량이 2배 증가합니다.',preview:'암습 피해\n×2',level:0,max:3},
  {id:10,icon:'🧿',name:'심안 개방',desc:'숨겨진 재화를 탐지할 수 있습니다.',preview:'숨겨진\n재화 감지',level:0,max:3},
  {id:11,icon:'🩸',name:'생명 흡수',desc:'공격 시 적의 체력을 흡수합니다.',preview:'체력 흡수\n공격',level:1,max:3},
  {id:12,icon:'🔮',name:'마법 증폭',desc:'모든 마법 스킬의 데미지가 25% 증가합니다.',preview:'마법 데미지\n+25%',level:0,max:3},
  {id:13,icon:'🌊',name:'심연의 파도',desc:'심연에서 강력한 파동 공격을 방출합니다.',preview:'심연 파동\n공격',level:1,max:3},
  {id:14,icon:'🗺️',name:'탐사 지도',desc:'탐사 경로가 자동으로 최적화됩니다.',preview:'경로 자동\n최적화',level:0,max:3},
  {id:15,icon:'👁️',name:'어둠의 눈',desc:'어두운 구역에서 시야가 확보됩니다.',preview:'야간 시야\n확보',level:0,max:3},
];
let sel=null;
function render(){
  const g=document.getElementById('sg');
  g.innerHTML='';
  skills.forEach(s=>{
    const c=document.createElement('div');
    c.className='sc'+(s.level>=s.max?' maxed':'')+(sel===s.id?' active':'');
    c.innerHTML=`<div class="si">${s.icon}</div><span class="sl">${s.level}/${s.max}</span>`;
    c.onclick=()=>{
      if(sel===s.id){
        sel=null;
        document.getElementById('pb').innerHTML='(영상)<br>스킬 프리뷰';
        document.getElementById('db').innerHTML='스킬 설명';
      } else {
        sel=s.id;
        document.getElementById('pb').innerHTML=s.icon+'<br>'+s.preview.replace('\n','<br>');
        document.getElementById('db').innerHTML='<b>'+s.name+'</b><br><br>'+s.desc;
      }
      render();
    };
    g.appendChild(c);
  });
}
render();
</script>
